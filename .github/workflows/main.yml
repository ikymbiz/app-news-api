name: agent-platform

on:
  schedule:
    # news-daily: jobs.yml と同期 (22:30 UTC = 07:30 JST)
    - cron: "30 22 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Job id from config/jobs.yml (e.g. news-daily, news-manual)"
        required: true
        default: news-manual

permissions:
  contents: read

concurrency:
  group: agent-platform-${{ github.event.inputs.job || 'news-daily' }}
  cancel-in-progress: false

jobs:
  run:
    name: Run agent job
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONPATH: src
      AGENT_MAX_WORKERS: "4"
      # --- Required runtime secrets (Settings → Secrets → Actions) ---
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_R2_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}  # alias for r2_upload
      CLOUDFLARE_R2_KEY: ${{ secrets.CLOUDFLARE_R2_KEY }}
      CLOUDFLARE_R2_SECRET: ${{ secrets.CLOUDFLARE_R2_SECRET }}
      # --- Optional secret: omit if you don't need Firestore-backed observability ---
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      # --- Personal config (Settings → Variables → Actions, NOT a secret) ---
      AGENT_USER_CONTEXT: ${{ vars.AGENT_USER_CONTEXT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate schemas
        run: |
          python - <<'PY'
          import json, yaml, jsonschema
          js = json.load(open("config/jobs.schema.json"))
          ps = json.load(open("config/pipeline.schema.json"))
          jobs = yaml.safe_load(open("config/jobs.yml"))
          jsonschema.validate(jobs, js)
          for j in jobs["jobs"]:
              pipe = yaml.safe_load(open(j["pipeline"]))
              jsonschema.validate(pipe, ps)
          print("OK: schemas valid")
          PY

      - name: Resolve job id
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "job=${{ github.event.inputs.job }}" >> "$GITHUB_OUTPUT"
          else
            echo "job=news-daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Run orchestrator
        run: |
          python -m orchestrator.scheduler --job "${{ steps.resolve.outputs.job }}"
