name = "agent-platform-distributor"
main = "worker.js"
compatibility_date = "2025-05-01"

# --------------------------------------------------------------------------- #
# Routes
# --------------------------------------------------------------------------- #
# 実運用時は自前ドメインにルーティング。未設定時は workers.dev の既定ルート。
# routes = [
#   { pattern = "artifacts.example.invalid/*", zone_name = "example.invalid" }
# ]

# --------------------------------------------------------------------------- #
# Environment variables (非機密のみ。機密は `wrangler secret put` で登録)
# --------------------------------------------------------------------------- #
[vars]
ALLOWED_APPS = "news"
CORS_ORIGIN = "*"
# GitHub Contents プロキシ用(非機密)
# GH_REPO は "owner/name" 形式。GH_BRANCH 未設定時は main。
# GH_PAT は機密のため `wrangler secret put GH_PAT` で登録すること。
# ACCESS_ALLOWED_EMAILS は Cloudflare Access の許可リストに加えて Worker 側でも
# 二段階で検証したい場合に設定(カンマ区切り)。空なら Cf-Access-Authenticated-User-Email
# が付与されているリクエストはすべて許可。
GH_REPO = "owner/agent-platform"
GH_BRANCH = "main"
ACCESS_ALLOWED_EMAILS = ""

# --------------------------------------------------------------------------- #
# R2 binding
# --------------------------------------------------------------------------- #
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "agent-platform-artifacts"
preview_bucket_name = "agent-platform-artifacts-preview"

# --------------------------------------------------------------------------- #
# Observability
# --------------------------------------------------------------------------- #
[observability]
enabled = true
